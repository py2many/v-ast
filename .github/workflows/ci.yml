name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up V
        uses: vlang/setup-v@v1
        with:
          version: "0.5.1"

      - name: Set up libgc
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bdw-gc
            gc_prefix="$(brew --prefix bdw-gc)"
            echo "CPPFLAGS=-I${gc_prefix}/include" >> "$GITHUB_ENV"
            echo "LDFLAGS=-L${gc_prefix}/lib" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y libgc-dev
            echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
          fi

      - name: Run Python tests
        run: uv run --with pytest pytest tests_vlang_parser -q

      - name: Run V tests
        run: v -enable-globals test typed_api_test.v

  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up MinGW compiler
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Set up V
        uses: vlang/setup-v@v1
        with:
          version: "0.5.1"

      - name: Set up libgc
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bdw-gc
            gc_prefix="$(brew --prefix bdw-gc)"
            echo "CPPFLAGS=-I${gc_prefix}/include" >> "$GITHUB_ENV"
            echo "LDFLAGS=-L${gc_prefix}/lib" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y libgc-dev
            echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
          fi

      - name: Build wheel
        run: uv build --wheel --out-dir wheelhouse

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: v-ast-wheel-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error
