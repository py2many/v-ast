name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

env:
  V_VERSION: "0.5.1"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up V
        shell: bash
        run: |
          asset="v_linux.zip"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            if [[ "$RUNNER_ARCH" == "ARM64" ]]; then
              asset="v_macos_arm64.zip"
            else
              asset="v_macos_x86_64.zip"
            fi
          fi
          url="https://github.com/vlang/v/releases/download/${V_VERSION}/${asset}"
          curl -fsSL "$url" -o "$RUNNER_TEMP/v.zip"
          unzip -q "$RUNNER_TEMP/v.zip" -d "$RUNNER_TEMP/vlang"
          echo "$RUNNER_TEMP/vlang/v" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/vlang/v/v" version

      - name: Set up libgc
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bdw-gc
            gc_prefix="$(brew --prefix bdw-gc)"
            echo "CPPFLAGS=-I${gc_prefix}/include" >> "$GITHUB_ENV"
            echo "LDFLAGS=-L${gc_prefix}/lib" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y libgc-dev
            echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
          fi

      - name: Run Python tests
        run: uv run --with pytest pytest tests_vlang_parser -q

      - name: Run V tests
        run: v -enable-globals test typed_api_test.v

  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        if: runner.os != 'Linux'
        uses: astral-sh/setup-uv@v5

      - name: Set up MinGW compiler
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Set up V
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "$RUNNER_ARCH" == "ARM64" ]]; then
            asset="v_macos_arm64.zip"
          else
            asset="v_macos_x86_64.zip"
          fi
          url="https://github.com/vlang/v/releases/download/${V_VERSION}/${asset}"
          curl -fsSL "$url" -o "$RUNNER_TEMP/v.zip"
          unzip -q "$RUNNER_TEMP/v.zip" -d "$RUNNER_TEMP/vlang"
          echo "$RUNNER_TEMP/vlang/v" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/vlang/v/v" version

      - name: Set up V
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/vlang/v/releases/download/$env:V_VERSION/v_windows.zip"
          $zip = Join-Path $env:RUNNER_TEMP "v.zip"
          $dest = Join-Path $env:RUNNER_TEMP "vlang"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $dest -Force
          $vBin = Join-Path $dest "v"
          Add-Content -Path $env:GITHUB_PATH -Value $vBin
          & (Join-Path $vBin "v.exe") version

      - name: Set up libgc
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install bdw-gc
          gc_prefix="$(brew --prefix bdw-gc)"
          echo "CPPFLAGS=-I${gc_prefix}/include" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L${gc_prefix}/lib" >> "$GITHUB_ENV"

      - name: Build wheel
        if: runner.os != 'Linux'
        run: uv build --wheel --out-dir wheelhouse

      - name: Build manylinux wheel
        if: runner.os == 'Linux'
        shell: bash
        run: |
          docker run --rm \
            -e V_VERSION="${V_VERSION}" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            pypa/manylinux_2_28_x86_64 \
            bash -euxo pipefail -c '
              dnf install -y gc-devel unzip
              curl -fsSL "https://github.com/vlang/v/releases/download/${V_VERSION}/v_linux.zip" -o /tmp/v.zip
              unzip -q /tmp/v.zip -d /tmp/vlang
              export PATH="/tmp/vlang/v:${PATH}"
              v version
              /opt/python/cp312-cp312/bin/pip install uv
              /opt/python/cp312-cp312/bin/uv build --wheel --out-dir wheelhouse-raw
              auditwheel repair wheelhouse-raw/*.whl --wheel-dir wheelhouse
              chown -R "${HOST_UID}:${HOST_GID}" wheelhouse wheelhouse-raw
            '

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: v-ast-wheel-${{ runner.os }}-${{ runner.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  deploy:
    name: Deploy wheels to PyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: v-ast-wheel-*
          path: dist
          merge-multiple: true

      - name: Publish wheels
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
